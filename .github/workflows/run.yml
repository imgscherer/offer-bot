name: offer-bot

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          NICHE: motherhood
          BRAND_HANDLE: ${{ vars.BRAND_HANDLE }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_ACCESS_TOKEN: ${{ secrets.WA_ACCESS_TOKEN }}
          WA_GROUP_ID: ${{ secrets.WA_GROUP_ID }}
          MIN_DISCOUNT_PCT: "30"
          MAX_OFFERS_PER_RUN: "5"
        run: python -m src.orchestrator

      - name: Commit history + pages
        run: |
          git config user.name "offer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/history.json pages/
          git diff --staged --quiet || git commit -m "chore: update history + bio page [skip ci]"
          git push

  deploy-pages:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main             # checkout the just-committed state
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - id: deployment
        uses: actions/deploy-pages@v4
